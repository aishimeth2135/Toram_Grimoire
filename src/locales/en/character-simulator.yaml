  deleta-all-data-success-tips: All character simulator data deleted successfully. Auto-save has been disabled. Please refresh the page.
  deleta-all-data-counter-title: Counter
  deleta-all-data-caption:
    - In some cases, character simulator data may become corrupted and prevent the system from working correctly. Use the button below to delete all character simulator data. Auto-save will be temporarily disabled, meaning current data will not be saved automatically.
    - Set the counter below to 10 to reveal the delete button.
    - After deleting data, refresh the page immediately to reinitialize the system.
