result:
  title: Calculation result
  modes:
    expected: Expected damage
    stability: Damage range
    stability-with-graze: Damage range (with Graze)
  modes-caption:
    expected: Expected damage value factoring in critical rate, accuracy, and stability.
    stability: Shows the maximum and minimum possible damage. Max is the highest damage on a critical hit, min is the lowest damage without a critical at minimum stability.
    stability-with-graze: Similar to damage range, but the minimum also accounts for Graze.
calc-mode:
  title: Calculation formula
  caption: Select which formula is displayed in the interface. The selected formula only affects the display, not the available fields or calculation results.
  modes:
    common: Basic formula
    critical: Critical hit formula
  modes-caption:
    common: The basic damage formula. Suitable for most calculations.
    critical: The critical hit damage formula, mainly used to display Two-Handed in the formula. Only shows critical hit damage — some fields are outside the formula.
compare:
  title: Build comparison
  caption: Compare the current build against other builds.
  select-build: Select builds to compare
  introduction: Click the button above to select builds to compare.
  at-least-two-builds-tips: At least two builds are required to use the comparison feature.
tips:
  at-least-one-build: At least one build must remain.
  removed-build-success: Build "{name}" removed.
